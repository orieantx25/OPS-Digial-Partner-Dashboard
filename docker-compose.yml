services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - dp-data:/app/data
    environment:
      - CORS_ORIGINS=http://localhost:3000
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  dp-data:
